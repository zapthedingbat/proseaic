<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Markdown AI Editor</title>
  <link rel="stylesheet" href="/app.css" />
  <link rel="stylesheet" href="/codicon.css" />
</head>
<body>

<div class="app">
  <header class="app-header">
    <ui-menu-bar>
      <button class="action-item" data-template-id="meeting-notes">Insert Meeting Notes</button>
    </ui-menu-bar>
  </header>
  <ui-settings-panel id="ui-settings-panel" popover></ui-settings-panel>
  <main class="app-main">
    <ui-pane-view class="pane-view left">
      <ui-pane title="Outline">
        <ui-outline-panel></ui-outline-panel>
      </ui-pane>
      <ui-pane title="Documents">
        <ui-document-panel></ui-document-panel>
      </ui-pane>
    </ui-pane-view>
    <section class="workspace center">
      <ui-markdown-editor></ui-markdown-editor>
    </section>
    <ui-pane-view class="pane-view right">
      <ui-pane title="Chat">
        <ui-chat-panel></ui-chat-panel>
      </ui-pane>
    </ui-pane-view>
  </main>
  <footer class="app-footer">
    <ui-menu-bar>
      <span>Markdown AI Editor</span>
    </ui-menu-bar>
  </footer>
</div>
<script type="module" src="/script.js"></script>
</body>
</html>
