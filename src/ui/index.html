<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Markdown AI Editor</title>
  <link rel="stylesheet" href="/codicon.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="page">
  <header>
    <menu-bar>
      <button data-template-id="meeting-notes">Insert Meeting Notes</button>
      <button popovertarget="settings-panel">Settings</button>
    </menu-bar>
  </header>
  <settings-panel id="settings-panel" popover></settings-panel>
  <main>
    <aside class="left">
      <outline-panel></outline-panel>
      <document-panel></document-panel>
    </aside>
    <section class="center">
      <markdown-editor></markdown-editor>
    </section>
    <aside class="right">
      <chat-panel></chat-panel>
    </aside>
  </main>
  <footer>
    <menu-bar>
      <button>Pull Model</button>
    </menu-bar>
  </footer>
</div>
<script type="module" src="/script.js"></script>
</body>
</html>
