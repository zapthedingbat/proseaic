<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Markdown AI Editor</title>
  <link rel="stylesheet" href="/app.css" />
  <link rel="stylesheet" href="/codicon.css" />
</head>
<body>

<div class="page">
  <header>
    <ui-menu-bar>
      <button data-template-id="meeting-notes">Insert Meeting Notes</button>
      <button popovertarget="ui-settings-panel">Settings</button>
    </ui-menu-bar>
  </header>
  <ui-settings-panel id="ui-settings-panel" popover></ui-settings-panel>
  <main>
    <aside class="left">
      <ui-pane-view>
        <ui-pane title="Outline">
          <ui-outline-panel></ui-outline-panel>
        </ui-pane>
        <ui-pane title="Documents">
          <ui-document-panel></ui-document-panel>
        </ui-pane>
      </ui-pane-view>
    </aside>
    <section class="center">
      <ui-markdown-editor></ui-markdown-editor>
    </section>
    <aside class="right">
      <ui-pane-view>
        <ui-pane title="Chat">
          <ui-chat-panel></ui-chat-panel>
        </ui-pane>
      </ui-pane-view>
    </aside>
  </main>
  <footer>
    <ui-menu-bar>
      <button>Pull Model</button>
    </ui-menu-bar>
  </footer>
</div>
<script type="module" src="/script.js"></script>
</body>
</html>
