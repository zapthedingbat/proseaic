name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: AI platform and model
      description: e.g. Ollama / llama3.1, Anthropic / claude-3-5-sonnet
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      description: e.g. Chrome 124, Firefox 126
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any console output or error messages.
      render: text
